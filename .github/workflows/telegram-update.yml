name: Telegram Website Updates

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_1: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          MSG="Website Updated%0ARepository: ${REPO}%0ACommit: ${COMMIT_MSG}%0ABy: ${ACTOR}"
          for CHAT_ID in ${CHAT_ID_1} ${CHAT_ID_2}; do
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=${MSG}"
          done
